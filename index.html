<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta property="og:title" content="Bolo de Chocolate Fit - Sem Açúcar e Sem Glúten">
    <meta property="og:description" content="Aprenda a fazer o melhor bolo fit do mundo! Fofinho, molhadinho e pronto em 15 minutos.">
    <meta property="og:image" content="https://images.pexels.com/photos/1055272/pexels-photo-1055272.jpeg?auto=compress&cs=tinysrgb&w=600">
    <meta property="og:type" content="website">

    <title>Receita Bolo Fit</title>
    
    <style>
        body { background-color: black; color: #00FF00; font-family: monospace; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; animation: initialFlash 2s steps(1) 1; text-align: center; }
        @keyframes initialFlash { 0%, 20%, 40% { background-color: red; } 10%, 30%, 50% { background-color: black; } }
        .hacker-image { max-width: 150px; border: 2px solid #00FF00; box-shadow: 0 0 15px #00FF00; margin: 15px; }
        .line { margin-bottom: 8px; white-space: nowrap; overflow: hidden; border-right: 2px solid #00FF00; width: 0; animation: typing 1.5s steps(30, end) forwards, blink-caret .75s step-end infinite; display: inline-block; }
        @keyframes typing { from { width: 0 } to { width: 100% } }
        @keyframes blink-caret { 50% { border-color: transparent; } }
        .perdeu-playboy { font-size: 10vw; color: #FF0000; font-weight: bold; text-transform: uppercase; letter-spacing: 5px; text-shadow: 0 0 20px red; animation: pulse 1s ease-in-out infinite alternate; }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.1); } }
    </style>
</head>
<body>
    <img src="https://upload.wikimedia.org/wikipedia/commons/a/a6/Anonymous_emblem.svg" class="hacker-image">
    <div>
        <div class="line" style="animation-delay: 2s;">> ANALISANDO CALORIAS...</div><br>
        <div class="line" style="animation-delay: 4s;">> ERRO: SISTEMA INVADIDO!</div>
    </div>
    <div class="perdeu-playboy">PERDEU PLAYBOY</div>
    <img src="https://cdn.pixabay.com/photo/2017/01/31/15/34/icon-2025118_1280.png" class="hacker-image" style="max-width: 80px;">
</body>
</html>
